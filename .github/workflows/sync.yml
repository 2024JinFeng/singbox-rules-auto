name: Sync Rulesets to SRS
on:
  schedule:
    - cron: '0 2,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-parser:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - run: pip install requests

    - run: |
        LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
        curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${LATEST_TAG}/sing-box-${LATEST_TAG}-linux-amd64.tar.gz"
        tar -xzf sing-box.tar.gz --strip-components=1 "sing-box-${LATEST_TAG}-linux-amd64/sing-box"
        chmod +x sing-box

    - run: python convert.py

    - name: Debug and Push
      run: |
        echo "===== 1. 添加前状态 ====="
        git status
        
        # 将 srs 目录下的变更暂存
        mkdir -p srs
        git add srs/*.srs
        
        echo "===== 2. 添加后状态 ====="
        git status
        
        # 检查是否有暂存的变更
        if ! git diff --staged --quiet; then
          echo "检测到规则集有更新，开始推送到仓库..."
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git commit -m "Auto Update SRS Rulesets"
          git push origin main
        else
          echo "===== 结论：上游规则无任何变更，无需 push ====="
        fi
